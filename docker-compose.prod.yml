services:
  nestjs-app:
    image: api-assessment:latest
    container_name: api-assessment
    ports:
      - '3000:3000'
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - assessment-network

  postgres:
    image: postgres:15
    container_name: assessment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: asmt123ASMT!@#
      POSTGRES_DB: assessment_prod
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - assessment-network

networks:
  assessment-network:
    driver: bridge

volumes:
  postgres_data: